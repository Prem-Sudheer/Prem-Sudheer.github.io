<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prem Sudheer</title>
  <meta name="description" content="Prem Sudheer — personal profile. More to come soon." />
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.6;
      padding: 56px 20px;
      display: flex;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 720px;
      border: 1px solid rgba(120,120,120,0.25);
      border-radius: 16px;
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 34px;
      letter-spacing: -0.5px;
    }
    p { margin: 10px 0; font-size: 18px; }
    .links { margin-top: 18px; display: flex; gap: 14px; flex-wrap: wrap; }
    a {
      text-decoration: none;
      border: 1px solid rgba(120,120,120,0.35);
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    a:hover { transform: translateY(-1px); }
    .muted { opacity: 0.75; font-size: 16px; margin-top: 18px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Prem Sudheer</h1>
    <p>This is Prem Sudheer.</p>

    <div class="links">
      <!-- Replace the email below -->
      <a href="mailto:your@email.com">Email</a>

      <!-- Replace the LinkedIn URL below -->
      <a href="https://www.linkedin.com/in/your-linkedin/" target="_blank" rel="noopener noreferrer">
        LinkedIn
      </a>
    </div>

  </main>
